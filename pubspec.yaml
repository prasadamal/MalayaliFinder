name: malayali_finder
description: Find Malayalees around you with radar, maps, and events.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Location services
  geolocator: ^11.0.0
  geocoding: ^2.1.1

  # Free maps (OpenStreetMap – no API key required)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Animations
  animate_do: ^3.3.3

  # Fonts & icons
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

  # Permissions
  permission_handler: ^11.3.0

  # Local storage
  shared_preferences: ^2.2.3

  # Date formatting
  intl: ^0.19.0

  # UUID generation
  uuid: ^4.3.3

  # Image picker for profile photo
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
